<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — Grow Up Agency</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Tajawal', Arial, sans-serif;
  background: linear-gradient(135deg, #0a0f1e, #1a1f2e);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.login-box {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 40px 32px;
  max-width: 420px;
  width: 100%;
  text-align: center;
}

.logo {
  width: 72px; height: 72px;
  margin: 0 auto 20px;
  background: linear-gradient(135deg, #fe2c55, #25f4ee);
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
}

h1 {
  font-size: 24px;
  font-weight: 900;
  color: #fff;
  margin-bottom: 8px;
}

.subtitle {
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 32px;
}

.field {
  text-align: right;
  margin-bottom: 16px;
}

.field label {
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  display: block;
  margin-bottom: 7px;
}

.field input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(255,255,255,0.1);
  color: #fff;
  font-size: 14px;
  padding: 13px 15px;
  border-radius: 10px;
  outline: none;
  font-family: 'Tajawal', Arial, sans-serif;
  transition: border-color 0.2s;
}

.field input:focus {
  border-color: #00d4ff;
}

.btn {
  width: 100%;
  background: linear-gradient(135deg, #fe2c55, #ff6b35);
  color: #fff;
  border: none;
  font-size: 16px;
  font-weight: 800;
  padding: 15px;
  border-radius: 12px;
  cursor: pointer;
  font-family: 'Tajawal', Arial, sans-serif;
  margin-top: 8px;
  transition: opacity 0.2s;
}

.btn:hover { opacity: 0.9; }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }

.error {
  display: none;
  background: rgba(254,44,85,0.1);
  border: 1px solid rgba(254,44,85,0.3);
  color: #fe2c55;
  font-size: 12px;
  padding: 11px 14px;
  border-radius: 8px;
  margin-top: 14px;
  text-align: center;
}

.error.show { display: block; }

.hint {
  margin-top: 24px;
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  line-height: 1.6;
}

.hint strong { color: rgba(255,255,255,0.5); }

.roles {
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.06);
}

.roles-title {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 12px;
}

.role-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.role-card {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 10px 8px;
  font-size: 10px;
  color: rgba(255,255,255,0.4);
}

.role-card strong {
  display: block;
  font-size: 11px;
  color: rgba(255,255,255,0.7);
  margin-bottom: 4px;
}
</style>
</head>
<body>

<div class="login-box">
  <div class="logo">⚡</div>
  <h1>Grow Up Agency</h1>
  <p class="subtitle">تسجيل الدخول إلى لوحة التحكم</p>

  <div class="field">
    <label>📧 البريد الإلكتروني</label>
    <input type="email" id="email" placeholder="admin@growupagency.dz" autocomplete="email">
  </div>

  <div class="field">
    <label>🔒 كلمة المرور</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn" id="login-btn" onclick="login()">
    <span id="btn-text">دخول</span>
  </button>

  <div class="error" id="error"></div>

  <div class="hint">
    البريد الافتراضي: <strong>admin@growupagency.dz</strong><br>
    كلمة المرور: <strong>Admin@2026</strong>
  </div>

  <div class="roles">
    <div class="roles-title">الأدوار المتاحة:</div>
    <div class="role-grid">
      <div class="role-card">
        <strong>👑 Admin</strong>
        كامل الصلاحيات
      </div>
      <div class="role-card">
        <strong>👨‍💼 Manager</strong>
        إدارة + تقارير
      </div>
      <div class="role-card">
        <strong>👤 Agent</strong>
        إدارة العملاء
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://dwjdvmexwcbqnmdsmfkb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3amR2bWV4d2NicW5tZHNtZmtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5ODAzNzQsImV4cCI6MjA5MjU1NjM3NH0.HeTwUpvviJv7tyhhvEC461HT5gWpK_or2rUxAqToxDQ';

const SB_HEADERS = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY
};

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const btnText = document.getElementById('btn-text');
  const errorDiv = document.getElementById('error');

  if (!email || !password) {
    showError('يرجى ملء البريد الإلكتروني وكلمة المرور');
    return;
  }

  btn.disabled = true;
  btnText.textContent = 'جاري التحقق...';
  errorDiv.classList.remove('show');

  try {
    // Hash password
    const passHash = await sha256(password);

    // Get user
    const res = await fetch(SUPABASE_URL + '/rest/v1/users?email=eq.' + encodeURIComponent(email), {
      headers: SB_HEADERS
    });

    if (!res.ok) throw new Error('خطأ في الاتصال بالخادم');

    const users = await res.json();

    if (!users || !users.length) {
      throw new Error('البريد الإلكتروني غير موجود');
    }

    const user = users[0];

    // Check password
    let storedHash = user.password_hash;
    if (storedHash.startsWith('PLAIN:')) {
      storedHash = await sha256(storedHash.replace('PLAIN:', ''));
    }

    if (passHash !== storedHash) {
      throw new Error('كلمة المرور غير صحيحة');
    }

    if (!user.is_active) {
      throw new Error('حسابك معطّل — تواصل مع الإدارة');
    }

    // Create session
    const token = 'tk_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    const expiresAt = new Date();
    expiresAt.setDate(expiresAt.getDate() + 7);

    await fetch(SUPABASE_URL + '/rest/v1/sessions', {
      method: 'POST',
      headers: SB_HEADERS,
      body: JSON.stringify({
        user_id: user.id,
        token: token,
        expires_at: expiresAt.toISOString()
      })
    });

    // Update last_login
    await fetch(SUPABASE_URL + '/rest/v1/users?id=eq.' + user.id, {
      method: 'PATCH',
      headers: SB_HEADERS,
      body: JSON.stringify({ last_login: new Date().toISOString() })
    });

    // Save token
    localStorage.setItem('_auth_token', token);
    localStorage.setItem('_user_role', user.role);
    localStorage.setItem('_user_name', user.full_name);

    // Redirect to dashboard
    window.location.href = 'index.html';

  } catch(e) {
    showError(e.message || 'خطأ في تسجيل الدخول');
    btn.disabled = false;
    btnText.textContent = 'دخول';
  }
}

function showError(msg) {
  const errorDiv = document.getElementById('error');
  errorDiv.textContent = '⚠️ ' + msg;
  errorDiv.classList.add('show');
}

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// Enter to login
document.getElementById('password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') login();
});
document.getElementById('email').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('password').focus();
});

// Check if already logged in
window.onload = async function() {
  const token = localStorage.getItem('_auth_token');
  if (token) {
    try {
      const res = await fetch(SUPABASE_URL + '/rest/v1/sessions?token=eq.' + token + '&select=expires_at', {
        headers: SB_HEADERS
      });
      const sessions = await res.json();
      if (sessions && sessions.length && new Date(sessions[0].expires_at) > new Date()) {
        window.location.href = 'index.html';
      }
    } catch(e) {}
  }
};
</script>

</body>
</html>
