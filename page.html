<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جاري التحميل...</title>
<style>
body {
  margin: 0;
  padding: 0;
  font-family: 'Tajawal', Arial, sans-serif;
}
#loader {
  position: fixed;
  inset: 0;
  background: #0a0f1e;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
.spinner {
  width: 50px;
  height: 50px;
  border: 4px solid rgba(0,212,255,0.2);
  border-top-color: #00d4ff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
#error {
  display: none;
  text-align: center;
  padding: 40px;
  color: #fe2c55;
  font-size: 18px;
}
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
</div>

<div id="error"></div>

<div id="page-content"></div>

<script>
const SUPABASE_URL = 'https://dwjdvmexwcbqnmdsmfkb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3amR2bWV4d2NicW5tZHNtZmtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5ODAzNzQsImV4cCI6MjA5MjU1NjM3NH0.HeTwUpvviJv7tyhhvEC461HT5gWpK_or2rUxAqToxDQ';

async function loadPage() {
  try {
    // Get slug from URL
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');

    if (!slug) {
      throw new Error('لا يوجد صفحة محددة');
    }

    // Fetch page from Supabase
    const res = await fetch(SUPABASE_URL + '/rest/v1/landing_pages?slug=eq.' + slug + '&is_published=eq.true', {
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      }
    });

    const pages = await res.json();

    if (!pages || !pages.length) {
      throw new Error('الصفحة غير موجودة أو غير منشورة');
    }

    const page = pages[0];

    // Update page title
    document.title = page.title;

    // Increment view count
    fetch(SUPABASE_URL + '/rest/v1/landing_pages?id=eq.' + page.id, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      },
      body: JSON.stringify({ views_count: (page.views_count || 0) + 1 })
    }).catch(() => {});

    // Render page
    document.getElementById('page-content').innerHTML = page.html_content;
    document.getElementById('loader').style.display = 'none';

  } catch(e) {
    console.error('Page load error:', e);
    document.getElementById('loader').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = '❌ ' + e.message;
  }
}

loadPage();
</script>

</body>
</html>
